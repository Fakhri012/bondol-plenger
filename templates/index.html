<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Generator Surat Lamaran Kerja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main>
      <section class="form-section py-5">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-xl-7 col-lg-8">
              <div class="card glass-card shadow-lg border-0">
                <div class="card-body p-5">
                  <div class="d-flex align-items-start justify-content-between flex-column flex-md-row mb-4 gap-3">
                    <div>
                      <h2 class="h3 mb-1">Surat Lamaran Kerja untuk si Bondol</h2>
                      <p class="text-muted mb-0">Langsung buat file PDF dengan tampilan surat profesional dan siap pakai.</p>
                    </div>
                    <div class="badge rounded-pill bg-primary text-white px-3 py-2">Bocil Batu</div>
                  </div>

                  {% if errors %}
                  <div class="alert alert-danger shadow-sm" role="alert">
                    <ul class="mb-0">
                      {% for error in errors %}
                      <li>{{ error }}</li>
                      {% endfor %}
                    </ul>
                  </div>
                  {% endif %}

                  <form action="/generate" method="post" novalidate>
                    <div class="mb-4">
                      <label for="nama_perusahaan" class="form-label">Nama Perusahaan</label>
                      <input type="text" class="form-control" id="nama_perusahaan" name="nama_perusahaan" placeholder="Contoh: PT ABC" required value="{{ form.nama_perusahaan if form else '' }}">
                    </div>
                    <div class="mb-4">
                      <label for="lokasi_perusahaan" class="form-label">Lokasi Perusahaan</label>
                      <input type="text" class="form-control" id="lokasi_perusahaan" name="lokasi_perusahaan" placeholder="Contoh: Jakarta" required value="{{ form.lokasi_perusahaan if form else '' }}">
                    </div>
                    <div class="mb-4">
                      <label for="job_posisi" class="form-label">Posisi yang Dilamar</label>
                      <input type="text" class="form-control" id="job_posisi" name="job_posisi" placeholder="Contoh: Staff Administrasi" required value="{{ form.job_posisi if form else '' }}">
                    </div>
                    <div class="mb-4">
                      <label for="tanggal" class="form-label">Tanggal Surat</label>
                      <input type="date" class="form-control" id="tanggal" name="tanggal" required value="{{ form.tanggal if form else '' }}">
                    </div>
                    <div class="d-grid">
                      <button type="submit" class="btn btn-gradient btn-lg">Generate PDF</button>
                    </div>
                  </form>
                </div>
              </div>
              <p class="text-center text-muted mt-4 mb-0">Aplikasi buat si bondol plenger untuk mempermudahan nyari kerja.</p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
